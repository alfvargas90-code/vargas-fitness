<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cinematic Hero · preview</title>
<style>
  :root{
    --cyan:#00C8FF; --purple:#8A5CFF; --purpled:#9A6BFF; --coral:#FF5E62;
    --muted:#8A90A6; --ink:#03050F;
  }
  *{box-sizing:border-box}
  html{background:#03050F}
  html,body{margin:0}
  body{
    color:#F2F5FA; overflow-x:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    background:
      radial-gradient(118% 60% at 50% 22%, rgba(88,62,205,.42), transparent 60%),
      radial-gradient(circle at 2% 38%, rgba(0,200,255,.12), transparent 44%),
      radial-gradient(circle at 98% 38%, rgba(255,94,98,.12), transparent 44%),
      radial-gradient(circle at 86% 64%, rgba(255,138,61,.10), transparent 46%),
      radial-gradient(circle at 14% 66%, rgba(138,92,255,.13), transparent 46%),
      linear-gradient(180deg, #03050F 0%, #04061a 52%, #03040E 100%);
    background-color:#03050F; background-attachment:fixed;
  }
  .frame{max-width:375px;margin:0 auto;padding:0;
    padding-top:max(8px, env(safe-area-inset-top))}

  /* live-style status row above the hero */
  .nowrow{display:flex;align-items:center;justify-content:space-between;
    padding:4px 14px 8px;opacity:0;animation:starsIn .9s ease-out 1.4s forwards}
  .nowrow .now{font-size:12px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:#9A6BFF}
  .nowrow .now b{color:#C9C2E0;font-weight:700}
  .synced{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;
    color:#39D98A;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
    padding:5px 11px;border-radius:999px}
  .synced i{width:7px;height:7px;border-radius:50%;background:#39D98A;box-shadow:0 0 8px #39D98A}

  /* ── Cinematic stage ─────────────────────────────────────────── */
  .stage{
    position:relative; width:375px; height:392px; overflow:hidden;
    animation:sceneIn .9s ease-out both;
  }
  /* slow Ken Burns drift on the whole scene */
  .kb{ position:absolute; inset:0; transform-origin:50% 38%;
    animation:kenBurns 26s ease-in-out 1.2s infinite alternate; }

  /* star layers */
  .stars{ position:absolute; inset:-10% ; pointer-events:none; }
  .starsA{
    background-image:
      radial-gradient(rgba(255,255,255,.95) .7px, transparent 1.1px),
      radial-gradient(rgba(191,230,255,.9) .6px, transparent 1.05px);
    background-size:46px 46px, 78px 78px;
    background-position:0 0, 23px 31px;
    opacity:0; animation:starsIn 1.6s ease-out .2s forwards, driftA 58s ease-in-out 2s infinite alternate;
    -webkit-mask-image:radial-gradient(150% 86% at 50% 28%, #000 0%, transparent 72%);
            mask-image:radial-gradient(150% 86% at 50% 28%, #000 0%, transparent 72%);
  }
  .starsB{
    background-image:radial-gradient(rgba(255,255,255,1) 1px, transparent 1.6px);
    background-size:120px 120px; background-position:41px 19px;
    opacity:0; animation:starsIn 1.8s ease-out .35s forwards, driftB 84s linear 2s infinite;
    -webkit-mask-image:radial-gradient(150% 86% at 50% 28%, #000 0%, transparent 70%);
            mask-image:radial-gradient(150% 86% at 50% 28%, #000 0%, transparent 70%);
  }
  /* bright feature stars that twinkle */
  .twinkle{position:absolute;border-radius:50%;background:#EAF2FF;
    box-shadow:0 0 6px 1px rgba(210,230,255,.8); opacity:0;
    animation:twinkle 4.5s ease-in-out infinite;}

  /* nebula bloom behind the moon */
  .nebula{
    position:absolute; left:50%; top:18px; width:330px; height:300px;
    transform:translateX(-50%) scale(.6); transform-origin:50% 42%;
    background:
      radial-gradient(46% 44% at 50% 42%, rgba(120,108,255,.42), transparent 70%),
      radial-gradient(40% 40% at 50% 42%, rgba(80,70,200,.20), transparent 76%);
    filter:blur(14px); opacity:0;
    animation:nebulaIn 1.6s cubic-bezier(.2,.7,.2,1) .25s forwards, nebulaBreath 9s ease-in-out 2.4s infinite alternate;
  }
  /* converging wave glow — cyan left, purple center, coral right (like live) */
  .waveglow{
    position:absolute; left:0; right:0; top:120px; height:220px; pointer-events:none;
    background:
      radial-gradient(120px 60px at 18% 64%, rgba(0,200,255,.30), transparent 72%),
      radial-gradient(120px 60px at 82% 64%, rgba(255,94,98,.28), transparent 72%),
      radial-gradient(150px 60px at 50% 70%, rgba(138,92,255,.32), transparent 74%);
    filter:blur(12px); mix-blend-mode:screen; opacity:0;
    animation:glowIn 1.8s ease-out .8s forwards, glowPulse 7s ease-in-out 2.6s infinite alternate;
  }

  /* moon + rings (real SVG) */
  .moonwrap{
    position:absolute; left:50%; top:12px; width:260px; height:260px;
    transform:translateX(-50%);
    filter:saturate(1.12) contrast(1.04);
  }
  .moonrise{
    width:100%; height:100%; transform-origin:50% 50%;
    animation:moonRise 1.9s cubic-bezier(.16,.84,.3,1) .35s both,
              moonFloat 11s ease-in-out 2.4s infinite alternate;
  }
  /* extra volumetric bloom seated under the moon */
  .moonbloom{
    position:absolute; left:50%; top:60px; width:240px; height:240px;
    transform:translateX(-50%);
    background:radial-gradient(circle at 50% 46%, rgba(202,216,255,.30), rgba(150,180,235,.10) 42%, transparent 66%);
    filter:blur(10px); opacity:0; pointer-events:none;
    animation:bloomIn 1.8s ease-out .9s forwards, bloomBreath 6.5s ease-in-out 2.6s infinite alternate;
  }
  /* anamorphic lens streak across the moon limb on settle */
  .flare{
    position:absolute; left:50%; top:128px; width:340px; height:3px;
    transform:translate(-50%,-50%) scaleX(0); transform-origin:50% 50%;
    background:linear-gradient(90deg, transparent, rgba(190,239,255,.85) 38%, #fff 50%, rgba(216,203,255,.85) 62%, transparent);
    filter:blur(1.4px); opacity:0; pointer-events:none;
    animation:flare 1.5s ease-out 1.5s forwards;
  }

  /* rising dust motes */
  .dust span{position:absolute;bottom:60px;width:2px;height:2px;border-radius:50%;
    background:rgba(206,224,255,.7);opacity:0;
    animation:dust 9s linear infinite;}

  /* vignette + subtle letterbox */
  .vignette{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(130% 90% at 50% 34%, transparent 56%, rgba(2,3,11,.62) 100%);}
  .letter{position:absolute;left:0;right:0;height:26px;pointer-events:none;}
  .letter.t{top:0;background:linear-gradient(180deg, rgba(2,3,11,.66), transparent);}
  .letter.b{bottom:0;background:linear-gradient(0deg, rgba(2,3,11,.7), transparent);}

  /* ── metric corners ─────────────────────────────────────────── */
  .corner{position:absolute;display:flex;flex-direction:column;line-height:1.02;
    background:none;border:none;z-index:6;opacity:0;}
  .c-recovery{left:6px;top:8px;align-items:flex-start;text-align:left;
    animation:cornerIn .9s ease-out 1.55s both;}
  .c-sleep{right:6px;top:8px;align-items:flex-end;text-align:right;
    animation:cornerIn .9s ease-out 1.75s both;}
  .c-strain{right:6px;top:208px;align-items:flex-end;text-align:right;
    animation:cornerIn .9s ease-out 1.95s both;}
  .cap{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase}
  .num{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .word{font-size:13px;font-weight:700;margin-top:2px}
  .detail{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600}
  .g-cyan{text-shadow:0 0 17px rgba(0,200,255,.85)}
  .g-purple{text-shadow:0 0 17px rgba(138,92,255,.85)}
  .g-coral{text-shadow:0 0 18px rgba(255,94,98,.9)}

  /* lunar context under the moon */
  .ctx{position:absolute;left:50%;top:300px;transform:translateX(-50%);
    width:320px;text-align:center;z-index:6;opacity:0;
    animation:ctxIn 1s ease-out 2.1s both;}
  .ctx .phase{font-size:12px;font-weight:700;letter-spacing:.4px;color:#C9B8FF;
    text-shadow:0 0 12px rgba(154,107,255,.55)}
  .ctx .sub{font-size:10.5px;color:var(--muted);margin-top:2px;font-weight:600}

  /* peek of the next card so the hero reads in-context */
  .peek{margin:2px 12px 0;padding:13px 15px;border-radius:22px 22px 0 0;
    background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0) 60%), rgba(20,26,54,0.66);
    border:1px solid rgba(255,255,255,0.11);border-bottom:none;
    -webkit-backdrop-filter:blur(24px) saturate(1.24);backdrop-filter:blur(24px) saturate(1.24);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.16);
    opacity:0;animation:cornerIn 1s ease-out 2.3s both}
  .peek .h{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:700;color:#9A6BFF}
  .peek .read{font-size:13px;line-height:1.5;color:#d6dae6;margin-top:7px;font-style:italic;
    -webkit-mask-image:linear-gradient(180deg,#000 38%,transparent);mask-image:linear-gradient(180deg,#000 38%,transparent)}
  .caption{max-width:375px;margin:16px auto 26px;text-align:center;
    font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
    opacity:0;animation:starsIn 1s ease-out 2.5s forwards}

  /* ── keyframes ──────────────────────────────────────────────── */
  @keyframes sceneIn{from{opacity:0}to{opacity:1}}
  @keyframes starsIn{to{opacity:1}}
  @keyframes nebulaIn{from{opacity:0;transform:translateX(-50%) scale(.6)}to{opacity:1;transform:translateX(-50%) scale(1)}}
  @keyframes nebulaBreath{from{opacity:.82}to{opacity:1}}
  @keyframes glowIn{to{opacity:1}}
  @keyframes glowPulse{from{opacity:.78;filter:blur(12px)}to{opacity:1;filter:blur(15px)}}
  @keyframes moonRise{from{opacity:0;transform:translateY(36px) scale(.86);filter:brightness(.35)}
                      to{opacity:1;transform:translateY(0) scale(1);filter:brightness(1)}}
  @keyframes moonFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(-6px) scale(1.012)}}
  @keyframes bloomIn{to{opacity:1}}
  @keyframes bloomBreath{from{opacity:.7;transform:translateX(-50%) scale(1)}to{opacity:1;transform:translateX(-50%) scale(1.05)}}
  @keyframes kenBurns{from{transform:scale(1)}to{transform:scale(1.045) translateY(-4px)}}
  @keyframes driftA{from{transform:translate(0,0)}to{transform:translate(-10px,6px)}}
  @keyframes driftB{from{transform:translate(0,0)}to{transform:translate(14px,0)}}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.95}}
  @keyframes cornerIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
  @keyframes ctxIn{from{opacity:0;transform:translate(-50%,9px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes flare{0%{opacity:0;transform:translate(-50%,-50%) scaleX(0)}
                   35%{opacity:.9}
                   100%{opacity:0;transform:translate(-50%,-50%) scaleX(1)}}
  @keyframes dust{0%{opacity:0;transform:translateY(0)}12%{opacity:.7}100%{opacity:0;transform:translateY(-150px)}}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important}
    .stage,.starsA,.starsB,.nebula,.waveglow,.moonbloom,.corner,.ctx,.caption{opacity:1}
    .nebula{transform:translateX(-50%) scale(1)}
  }
</style>
</head>

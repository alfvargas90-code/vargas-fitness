<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Timing Weather</title>
<!-- PWA / Add to Home Screen -->
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="theme-color" content="#030404" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Timing" />
<!-- ── Self-healing cache buster (Layers 1+3) ─────────────────────────────────
     Runs before any other JS. Compares this device's stored version against the
     live version.json; on a mismatch it nukes caches and reloads ONCE so a stale
     home-screen PWA can never pin an old build. First visit never reloads.
     Wrapped in try/catch — a failure here must never block the page from loading.
     Escape hatch: append ?clear=1 to the URL to fully reset every storage layer.
     Docs: docs/cache-busting.md -->
<script>
(async () => {
  try {
    const url = new URL(window.location.href);
    if (url.searchParams.get('clear') === '1') {
      // Emergency nuke — wipe every client-side storage layer, then reload clean.
      try { const dbs = (await indexedDB.databases?.()) || [];
            await Promise.all(dbs.map(db => indexedDB.deleteDatabase(db.name))); } catch (e) {}
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      try { localStorage.clear(); sessionStorage.clear(); } catch (e) {}
      url.searchParams.delete('clear');
      window.location.replace(url.pathname + url.search + (url.search ? '&' : '?') + 't=' + Date.now());
      return;
    }

    const resp = await fetch('version.json?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) return;
    const remote = await resp.json();
    const local = localStorage.getItem('dashboard_version');
    if (local !== remote.version) {
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      localStorage.setItem('dashboard_version', remote.version);
      if (local !== null) {
        // Only reload if they've been here before — first visit must not loop.
        window.location.reload();
        return;
      }
    }

    // Layer 3 — register the service worker (feature-detected, never fatal).
    if ('serviceWorker' in navigator) {
      try { await navigator.serviceWorker.register('sw.js'); } catch (e) {}
    }
  } catch (e) { /* silent — never block page load on the cache check */ }
})();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/timing-weather.css?v=v1.1-visual" />
</head>
<body>
  <div class="timing-weather-shell">
    <!-- Left panel (sections 1-8). On mobile, panels stack into the linear order. -->
    <section class="panel" id="tw-left" aria-label="Forecast"></section>
    <!-- Right panel (sections 1-6). -->
    <section class="panel" id="tw-right" aria-label="Details"></section>
  </div>

  <!-- Bottom navigation — fixed across both panels. Home active; rest decorative. -->
  <nav class="bottom-nav" id="tw-nav" aria-label="Primary"></nav>

  <script src="assets/js/timing_weather_render.js?v=v1.1-visual"></script>
  <script src="assets/js/timing_weather_engine.js?v=v1.1-visual"></script>
</body>
</html>
